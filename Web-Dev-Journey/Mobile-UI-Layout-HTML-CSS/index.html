<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>TVS Pharmacy</title>
</head>
<body>
    <div id="splash">
        <img src="https://i.ibb.co/G5jyXN9/logo.png" class="logo" alt="logo">
    </div>

    <div class="content">
        <div class="app-header">
            <div class="container">
                <img src="https://i.ibb.co/G5jyXN9/logo.png" alt="logo" class="logo">
                <input type="text" class="search" placeholder="Search...">
            </div>
        </div>

        <div class="subheader">
            <div>
                <p>Now delivering Rx + more</p>
                <p>Find out now <i class="fa fa-chevron-right"></i></p>
            </div>
            <img src="https://i.ibb.co/PxGygfW/delivery.png" alt="delivery img">
        </div>
        

        <div class="grid container">
            <!-- adding container onto this class aswell -->
             <div class="item">
                <h4>Pharmacy</h4>
                <p>2Rxs ready for refill</p>
                <img src="https://i.ibb.co/BKgzCc5/medicine.png" alt=""> 
             </div>
            <div class="item">
                <h4>Deals & Rewards</h4>
                <p class="desc">2 TraversyCare offers expiring</p>
                <img src="https://i.ibb.co/XY6WTq6/medal.png" alt="" />
            </div>
            <div class="item">
                <h4>SecondClinic</h4>
                <p class="desc"></p>
                <img src="https://i.ibb.co/F6YbmHw/nurse.png" alt="" />
            </div>
            <div class="item">
                <h4>Shop</h4>
                <p class="desc">Free shipping on orders $25+</p>
                <img src="https://i.ibb.co/30kN9wL/shop.png" alt="" />
            </div>
            <div class="item">
                <h4>Photo</h4>
                <p class="desc"></p>
                <img src="https://i.ibb.co/GszTNWF/photo.png" alt="" />
            </div>
            <div class="item">
                <h4>Weekly Ad</h4>
                <p class="desc">View your weekly ad</p>
                <img src="https://i.ibb.co/nDryZ8R/newspaper.png" alt="" />
            </div>
        </div>
    </div>

    <footer class="app-footer">
        <ul>
            <li>
                <i class="fa fa-heart"></i>
                <p>Home</p>
            </li>
            <li>
                <i class="fa fa-barcode"></i>
                <p>Show Card</p>
            </li>
            <li>
                <i class="fa fa-user"></i>
                <p>Account</p>
            </li>
            <li>
                <i class="fa fa-map-marker"></i>
                <p>Find Store</p>
            </li>
        </ul>
    </footer>

    <script>
        setTimeout(() => {
            const splash = document.getElementById('splash')
            splash.classList.toggle('fade')
        }, 2000)
    </script>
</body>
</html>
